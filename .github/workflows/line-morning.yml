name: Morning LINE econ report

# Hybrid delivery: the PC builds the econ report in the evening and commits line-latest.txt
# (+ line-date.txt) to this repo. This cron sends it to the owner on LINE in the morning,
# so delivery does not depend on the PC being awake (same scheme as carrier-digest).

on:
  schedule:
    # 20:33 UTC == 05:33 JST (owner asked for ~05:30; econ is a personal delivery, so the
    # early hour affects nobody else. carrier-digest stays at 07:13 JST: it goes to the
    # employee LINE group).
    # NOT on the hour: GitHub delays/drops scheduled runs most at the top of every hour
    # (2026-07-15: the first '0 22' fire never happened at all, and nothing alerted because
    # a run that never starts cannot fail).
    # MUST stay later than report-deliver.ps1's NORMAL/CATCH-UP boundary (hour 5). NORMAL
    # (=[16:00,05:00)) pushes and relies on THIS cron to send; if the send ran before that
    # window closed, anything generated in the gap would be pushed and never sent. Moving
    # this time means moving that boundary too - they are one design, not two settings.
    - cron: '33 20 * * *'
  workflow_dispatch: {}     # allow manual test runs

permissions:
  contents: read
  actions: read     # the already-delivered check reads this workflow's own run history

# Never let two sends overlap (e.g. a late cron firing while the watchdog dispatches a
# self-heal send). This does not stop *sequential* duplicates - the already-delivered
# check below does that.
concurrency:
  group: line-morning-send
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send econ report to LINE (owner)
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${LINE_CHANNEL_TOKEN:-}" ] || [ -z "${LINE_USER_ID:-}" ]; then
            echo "Secrets LINE_CHANNEL_TOKEN / LINE_USER_ID are not set"; exit 1
          fi
          # Staleness guard: only send if the report was built today or yesterday (JST),
          # so a PC that was off for days does not blast an old report as if it were fresh.
          today=$(TZ=Asia/Tokyo date +%F)
          yday=$(TZ=Asia/Tokyo date -d 'yesterday' +%F)
          d=$(cat line-date.txt 2>/dev/null || echo "")
          if [ "$d" != "$today" ] && [ "$d" != "$yday" ]; then
            echo "line-date='$d' is stale (today=$today); skipping send"
            echo "NOT_DELIVERED reason=stale date=$d"
            exit 0
          fi
          # Fresh date but no payload = broken state, NOT "nothing to do". Exiting 0 here is
          # what lets a non-delivery masquerade as a green run.
          if [ ! -f line-latest.txt ]; then
            echo "line-date='$d' is fresh but line-latest.txt is missing - inconsistent state"
            exit 1
          fi
          # Hash date+content -> v4-shaped UUID. LINE's X-Line-Retry-Key makes the send
          # idempotent server-side for 24h, so a late cron plus a CATCH-UP dispatch cannot
          # double-post the same report.
          full=$( { cat line-date.txt; cat line-latest.txt; } | sha256sum | cut -c1-32 )
          sha=${full:0:12}
          retry_key="${full:0:8}-${full:8:4}-4${full:13:3}-a${full:17:3}-${full:20:12}"

          # Sequential-duplicate guard: if an earlier run today already delivered THIS exact
          # report, do not send it again (a late cron plus the watchdog's self-heal dispatch
          # would otherwise double-post). The retry key alone would also stop it server-side,
          # but that is the last line of defence - do not spend it on cases we can see coming.
          since=$(date -u -d "$today 00:00 +0900" +%Y-%m-%dT%H:%M:%SZ)
          for rid in $(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/line-morning.yml/runs?per_page=30&status=success" \
                       | jq -r --arg since "$since" '.workflow_runs[] | select(.created_at >= $since) | .id'); do
            if [ "$rid" = "${GITHUB_RUN_ID:-}" ]; then continue; fi
            # Grep the EXPANDED sha, never a bare "DELIVERED_OK": Actions echoes this whole
            # run: block into the log, so the literal source line (which reads `sha=$sha`)
            # would match in every run and make an unsent report look delivered.
            if gh run view "$rid" --repo "$GITHUB_REPOSITORY" --log 2>/dev/null | grep -q "DELIVERED_OK sha=$sha"; then
              echo "report sha=$sha was already delivered by run $rid; skipping duplicate send"
              echo "NOT_DELIVERED reason=already-delivered sha=$sha"
              exit 0
            fi
          done

          jq -Rs --arg to "$LINE_USER_ID" \
            '{to:$to, messages:[{type:"text", text:.}]}' line-latest.txt > payload.json
          code=$(curl -sS --connect-timeout 10 --max-time 60 -o resp.json -w "%{http_code}" -X POST \
            https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer $LINE_CHANNEL_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Line-Retry-Key: $retry_key" \
            --data @payload.json)
          echo "LINE push HTTP $code"; cat resp.json || true
          # 409 = "The retry key is already accepted": LINE suppressed a duplicate of THIS
          # report. Already delivered, so not a failure (verified live 2026-07-15).
          if [ "$code" != "200" ] && [ "$code" != "409" ]; then
            exit 1
          fi
          if [ "$code" = "409" ]; then
            echo "LINE deduplicated a duplicate send (retry key already accepted)"
          fi
          # Machine-readable receipt: the watchdog must grep THIS, not the run conclusion,
          # because a skipped run is also "success".
          echo "DELIVERED_OK sha=$sha date=$d"

      - name: Alert owner on failure
        if: failure()
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          [ -z "${LINE_CHANNEL_TOKEN:-}" ] && exit 0
          [ -z "${LINE_USER_ID:-}" ] && exit 0
          jq -n --arg to "$LINE_USER_ID" \
            --arg text "[LSM自動配信] 朝の日次経済レポート配信に失敗しました（GitHub Actions）。Runログを確認してください。" \
            '{to:$to, messages:[{type:"text", text:$text}]}' > alert.json
          # Check the HTTP status: `curl ... || true` exits 0 on 401/429/500, so the old
          # version printed "alert sent" even when the owner was never actually notified.
          code=$(curl -sS --connect-timeout 10 --max-time 30 -o aresp.json -w "%{http_code}" \
            -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer $LINE_CHANNEL_TOKEN" \
            -H "Content-Type: application/json" \
            --data @alert.json) || code="000"
          cat aresp.json 2>/dev/null || true
          if [ "$code" = "200" ]; then
            echo "failure alert delivered to owner"
          else
            echo "::error::failure alert could NOT be delivered (LINE HTTP $code) - owner was NOT notified"
          fi
